name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build:lib

      - name: Extract version info
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ $TAG =~ - ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            if [[ $TAG =~ -alpha ]]; then
              echo "dist_tag=alpha" >> $GITHUB_OUTPUT
            elif [[ $TAG =~ -beta ]]; then
              echo "dist_tag=beta" >> $GITHUB_OUTPUT
            else
              echo "dist_tag=next" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm (Latest)
        if: steps.version.outputs.is_prerelease == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (Alpha/Beta/Next)
        if: steps.version.outputs.is_prerelease == 'true'
        run: npm publish --provenance --access public --tag ${{ steps.version.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
